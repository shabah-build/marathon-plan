<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marathon Plan">
<meta name="theme-color" content="#0e0f11">
<title>Half Marathon Training Plan</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏃%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230e0f11'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dominant-baseline='central' font-size='60'%3E🏃%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0f11;--surface:#16181c;--border:#2a2d35;--accent:#f97316;
    --accent2:#3b82f6;--green:#22c55e;--text:#e8eaf0;--muted:#6b7280;--card:#1c1f26;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);}
  body{color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;padding:0 0 100px;padding-top:env(safe-area-inset-top);}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 14px 14px;position:sticky;top:0;z-index:100;}
  .header-inner{max-width:860px;margin:0 auto;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
  .plan-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(22px,6vw,40px);text-transform:uppercase;letter-spacing:-1px;line-height:1;}
  .plan-title span{color:var(--accent);}
  .subtitle{color:var(--muted);font-size:10px;letter-spacing:.05em;text-transform:uppercase;margin-top:3px;}
  .progress-block{text-align:right;flex-shrink:0;}
  .progress-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
  .progress-bar-wrap{width:120px;height:5px;background:var(--border);border-radius:999px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .4s;width:0%;}
  .progress-pct{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--accent);margin-top:3px;line-height:1;}
  .progress-sub{font-size:9px;color:var(--muted);margin-top:2px;}
  .save-indicator{display:inline-flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-top:10px;}
  .save-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
  .reset-btn{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px solid var(--border);padding:4px 10px;border-radius:4px;cursor:pointer;}
  .save-row{display:flex;align-items:center;margin-top:10px;}
  main{max-width:860px;margin:0 auto;padding:18px 10px 0;}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
  .legend-dot{width:7px;height:7px;border-radius:50%;}
  .phase-header{display:flex;align-items:center;gap:10px;margin:26px 0 10px;}
  .phase-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:2px 8px;border-radius:999px;white-space:nowrap;}
  .phase-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;text-transform:uppercase;letter-spacing:.03em;}
  .phase-line{flex:1;height:1px;background:var(--border);}
  .week-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
  .week-card.completed{border-color:var(--green);}
  .week-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;}
  .week-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--accent);line-height:1;min-width:36px;}
  .week-card.completed .week-num{color:var(--green);}
  .week-info{flex:1;min-width:0;}
  .week-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .week-meta{font-size:10px;color:var(--muted);margin-top:1px;}
  .week-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .week-dots{display:flex;gap:3px;}
  .week-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .2s;}
  .week-dot.done{background:var(--green);}
  .week-chevron{color:var(--muted);font-size:12px;transition:transform .25s;}
  .week-card.open .week-chevron{transform:rotate(180deg);}
  .week-days{display:none;border-top:1px solid var(--border);}
  .week-card.open .week-days{display:block;}
  .day-row{display:flex;border-bottom:1px solid var(--border);}
  .day-row:last-child{border-bottom:none;}
  .day-row.day-rest{opacity:.55;}
  .day-check-col{display:flex;align-items:flex-start;justify-content:center;padding:14px 10px 14px 14px;flex-shrink:0;}
  .day-checkbox{width:24px;height:24px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-top:1px;}
  .day-checkbox:active{transform:scale(.88);}
  .day-checkbox.checked{background:var(--green);border-color:var(--green);}
  .day-checkbox.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700;}
  .day-content{flex:1;padding:12px 14px 12px 0;min-width:0;}
  .day-label{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap;}
  .day-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .day-type{font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:999px;}
  .tag-run{background:rgba(249,115,22,.15);color:var(--accent);}
  .tag-strength{background:rgba(59,130,246,.15);color:var(--accent2);}
  .tag-cardio{background:rgba(168,85,247,.15);color:#a855f7;}
  .tag-rest{background:rgba(107,114,128,.12);color:var(--muted);}
  .tag-combo{background:rgba(34,197,94,.12);color:var(--green);}
  .tag-long{background:rgba(234,179,8,.15);color:#eab308;}
  .day-title{font-weight:500;font-size:13px;margin-bottom:4px;line-height:1.3;}
  .day-detail{font-size:11px;color:#9ca3af;line-height:1.6;}
  .day-detail ul{list-style:none;padding:0;margin-top:2px;}
  .day-detail ul li{padding:1px 0 1px 13px;position:relative;}
  .day-detail ul li::before{content:'—';position:absolute;left:0;color:var(--border);}
  .day-detail strong{color:#d1d5db;font-weight:500;}
  .day-duration{font-size:10px;color:var(--muted);margin-top:4px;font-family:'Barlow Condensed',sans-serif;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.05em;padding:9px 18px;border-radius:8px;opacity:0;transition:all .3s ease;z-index:999;white-space:nowrap;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .footer-note{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:30px;}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="plan-title">Half <span>Marathon</span><br>Training Plan</div>
        <div class="subtitle">Mon–Thu · 4 Days/Week · 15 Weeks · Race Aug 9</div>
      </div>
      <div class="progress-block">
        <div class="progress-label">Progress</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="globalBar"></div></div>
        <div class="progress-pct" id="globalPct">0%</div>
        <div class="progress-sub" id="progressSub">0/52 sessions</div>
      </div>
    </div>
    <div class="save-row">
      <span class="save-indicator"><span class="save-dot"></span><span id="saveText">Auto-saved</span></span>
      <button class="reset-btn" id="btnReset">↺ Reset</button>
    </div>
  </div>
</header>
<main>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Run</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Strength</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Cardio</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Combo</div>
    <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>Long Run</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4b5563"></div>Rest</div>
  </div>
  <div id="plan"></div>
  <div class="footer-note">You've got this 💪</div>
</main>
<div class="toast" id="toast"></div>

var tagMap={"Run + Strength":"tag-combo","Run":"tag-run","Cardio":"tag-cardio","Strength":"tag-strength","Long Run":"tag-long","Rest":"tag-rest"};
var STORAGE_KEY='marathonPlanV1';
var checked={};

// Load from localStorage
try{
  var saved=localStorage.getItem(STORAGE_KEY);
  if(saved)checked=JSON.parse(saved)||{};
}catch(e){checked={};}

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(checked));}catch(e){}
}

function gk(wId,dIdx){return"w"+wId+"_d"+dIdx;}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

function flashSaved(){
  var el=document.getElementById('saveText');
  el.textContent='Saved ✓';
  setTimeout(function(){el.textContent='Auto-saved';},1500);
}

function updateProgress(){
  var total=0,done=0;
  weeks.forEach(function(w){w.days.forEach(function(d,i){if(d.type!=='rest'){total++;if(checked[gk(w.id,i)])done++;}});});
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('globalBar').style.width=pct+'%';
  document.getElementById('globalPct').textContent=pct+'%';
  document.getElementById('progressSub').textContent=done+'/'+total+' sessions';
}

function updateWeekCard(wId){
  var week=null;
  for(var i=0;i<weeks.length;i++){if(weeks[i].id===wId){week=weeks[i];break;}}
  if(!week)return;
  var card=document.getElementById('week-'+wId);
  if(!card)return;
  var dots=card.querySelectorAll('.week-dot');
  var done=0,total=0;
  week.days.forEach(function(d,i){
    if(d.type!=='rest'){
      total++;
      var isDone=!!checked[gk(wId,i)];
      if(isDone)done++;
      if(dots[i])dots[i].classList.toggle('done',isDone);
    }
  });
  card.classList.toggle('completed',total>0&&done===total);
}

document.getElementById('btnReset').addEventListener('click',function(){
  if(!confirm('Reset all progress? This cannot be undone.'))return;
  checked={};
  save();
  document.querySelectorAll('.day-checkbox').forEach(function(cb){cb.classList.remove('checked');});
  weeks.forEach(function(w){updateWeekCard(w.id);});
  updateProgress();
  showToast('↺ Progress reset');
});

function buildPlan(){
  var container=document.getElementById('plan');
  weeks.forEach(function(week){
    var phase=null;
    for(var p=0;p<phases.length;p++){if(phases[p].weeks[0]===week.id){phase=phases[p];break;}}
    if(phase){
      var ph=document.createElement('div');
      ph.className='phase-header';
      ph.innerHTML='<div class="phase-label">'+phase.label+'</div><div class="phase-title">'+phase.title+'</div><div class="phase-line"></div>';
      container.appendChild(ph);
    }
    var card=document.createElement('div');
    card.className='week-card';
    card.id='week-'+week.id;
    var dotsHTML=week.days.map(function(){return'<div class="week-dot"></div>';}).join('');
    card.innerHTML='<div class="week-header"><div class="week-num">W'+week.id+'</div><div class="week-info"><div class="week-name">'+week.name+'</div><div class="week-meta">'+week.meta+'</div></div><div class="week-right"><div class="week-dots">'+dotsHTML+'</div><div class="week-chevron">▾</div></div></div><div class="week-days"></div>';
    var daysEl=card.querySelector('.week-days');
    week.days.forEach(function(day,i){
      var row=document.createElement('div');
      row.className='day-row'+(day.type==='rest'?' day-rest':'');
      var canCheck=day.type!=='rest';
      var isChk=!!checked[gk(week.id,i)];
      var detailHTML=day.detail.map(function(line){
        if(line.endsWith&&line.endsWith(':'))return'<strong>'+line+'</strong>';
        return'<li>'+line+'</li>';
      }).join('');
      row.innerHTML='<div class="day-check-col"><div class="day-checkbox'+(isChk?' checked':'')+'" data-week="'+week.id+'" data-day="'+i+'"'+(canCheck?'':' style="opacity:.15;pointer-events:none"')+'></div></div><div class="day-content"><div class="day-label"><span class="day-name">'+day.day+'</span><span class="day-type '+(tagMap[day.tag]||'')+'">'+day.tag+'</span></div><div class="day-title">'+day.title+'</div><div class="day-detail"><ul>'+detailHTML+'</ul></div><div class="day-duration">⏱ '+day.duration+'</div></div>';
      daysEl.appendChild(row);
    });
    card.querySelector('.week-header').addEventListener('click',function(){card.classList.toggle('open');});
    card.querySelectorAll('.day-checkbox').forEach(function(cb){
      cb.addEventListener('click',function(e){
        e.stopPropagation();
        var wId=parseInt(cb.getAttribute('data-week'));
        var dIdx=parseInt(cb.getAttribute('data-day'));
        var key=gk(wId,dIdx);
        if(checked[key])delete checked[key];
        else checked[key]=true;
        cb.classList.toggle('checked',!!checked[key]);
        save();
        flashSaved();
        updateWeekCard(wId);
        updateProgress();
      });
    });
    updateWeekCard(week.id);
    container.appendChild(card);
  });
  var first=null;
  for(var i=0;i<weeks.length;i++){
    var w=weeks[i];
    var hasUncompleted=false;
    for(var j=0;j<w.days.length;j++){if(w.days[j].type!=='rest'&&!checked[gk(w.id,j)]){hasUncompleted=true;break;}}
    if(hasUncompleted){first=w;break;}
  }
  if(first){var fc=document.getElementById('week-'+first.id);if(fc)fc.classList.add('open');}
  updateProgress();
}

buildPlan();
</script>
